<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>حسابي</title>

<link rel="stylesheet" href="css/main.css">

<style>
.account{
min-height:100vh;
background:#0c0c0c;
padding:70px 8%;
}

.box{
max-width:800px;
margin:auto;
background:#141414;
padding:50px;
border-radius:30px;
box-shadow:0 0 25px rgba(212,175,55,.12);
text-align:center;
}

.box h1{
font-size:50px;
margin-bottom:30px;
}

.user-email{
font-size:26px;
color:#d4af37;
margin:25px 0;
word-break:break-all;
}

.account-note{
font-size:21px;
color:#ddd;
line-height:1.8;
margin:25px 0;
}

.logout-btn{
width:100%;
background:#d4af37;
color:#111;
padding:18px;
border:none;
border-radius:40px;
font-size:22px;
font-weight:bold;
cursor:pointer;
margin-top:25px;
}

.account-links{
margin-top:35px;
display:flex;
gap:15px;
justify-content:center;
flex-wrap:wrap;
}

.account-links a{
background:#222;
color:#fff;
padding:14px 24px;
border-radius:30px;
text-decoration:none;
font-weight:bold;
}

.loading{
font-size:28px;
color:#ddd;
}
</style>

</head>

<body>

<section class="account">

<div id="accountBox" class="box">

<div class="loading">
جاري تحميل بيانات الحساب...
</div>

</div>

</section>

<script type="module" src="js/account.js"></script>

</body>
</html>
