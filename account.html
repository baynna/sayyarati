<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>حسابي</title>

<link rel="stylesheet" href="css/main.css">

<style>

.account{
min-height:100vh;
background:#0c0c0c;
padding:70px 8%;
}

.box{
max-width:800px;
margin:auto;
background:#141414;
padding:50px;
border-radius:30px;
box-shadow:0 0 25px rgba(212,175,55,.12);
text-align:center;
}

.box h1{
font-size:50px;
margin-bottom:40px;
}

.input{
width:100%;
padding:18px;
margin-bottom:25px;
border:none;
border-radius:18px;
font-size:20px;
background:#222;
color:white;
}

.btn{
width:100%;
background:#d4af37;
color:#111;
padding:18px;
border:none;
border-radius:40px;
font-size:22px;
font-weight:bold;
cursor:pointer;
}

.user{
margin-top:30px;
font-size:22px;
}

</style>

</head>

<body>

<section class="account">

<div class="box">

<h1>حسابي</h1>

<input class="input" type="text" placeholder="رقم الهاتف">

<button class="btn">
إرسال رمز التحقق
</button>

<div class="user">
سيتم تسجيل الدخول عبر كود SMS
</div>

</div>

</section>

</body>
</html>
