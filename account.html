<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>حسابي</title>

<link rel="stylesheet" href="css/main.css">

<style>
.account{
min-height:100vh;
background:#0c0c0c;
padding:70px 8%;
}

.box{
max-width:850px;
margin:auto;
background:#141414;
padding:50px;
border-radius:30px;
box-shadow:0 0 25px rgba(212,175,55,.12);
text-align:center;
}

.box h1{
font-size:50px;
margin-bottom:30px;
}

.user-email{
font-size:26px;
color:#d4af37;
margin:25px 0;
word-break:break-all;
}

.logout-btn{
width:100%;
background:#d4af37;
color:#111;
padding:18px;
border:none;
border-radius:40px;
font-size:22px;
font-weight:bold;
cursor:pointer;
margin-top:25px;
}

.loading{
font-size:28px;
color:#ddd;
}

.my-cars-section{
max-width:850px;
margin:45px auto 0;
background:#141414;
padding:40px;
border-radius:30px;
box-shadow:0 0 25px rgba(212,175,55,.10);
}

.my-cars-section h2{
font-size:38px;
margin-bottom:30px;
text-align:center;
}

.my-car{
background:#1d1d1d;
padding:25px;
border-radius:22px;
margin-bottom:20px;
}

.my-car h3{
font-size:28px;
margin-bottom:12px;
}

.my-car p{
font-size:21px;
color:#ddd;
margin-bottom:18px;
}

.my-car a{
display:inline-block;
background:#d4af37;
color:#111;
padding:12px 28px;
border-radius:30px;
text-decoration:none;
font-weight:bold;
}

.empty{
text-align:center;
font-size:22px;
color:#ddd;
}
</style>

</head>

<body>

<section class="account">

<div id="accountBox" class="box">

<div class="loading">
جاري تحميل بيانات الحساب...
</div>

</div>

<div class="my-cars-section">

<h2>إعلاناتي</h2>

<div id="myCarsBox" class="empty">
جاري تحميل إعلاناتك...
</div>

</div>

</section>

<script type="module" src="js/account.js"></script>
<script type="module" src="js/mycars.js"></script>

</body>
</html>
