<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>تواصل معنا</title>

<link rel="stylesheet" href="css/main.css">

<style>
.page{
min-height:100vh;
background:#0c0c0c;
padding:70px 8%;
}

.box{
max-width:850px;
margin:auto;
background:#141414;
padding:55px;
border-radius:30px;
box-shadow:0 0 25px rgba(212,175,55,.12);
}

h1{
text-align:center;
font-size:54px;
margin-bottom:20px;
}

.subtitle{
text-align:center;
font-size:23px;
color:#ddd;
margin-bottom:45px;
line-height:1.8;
}

.field{
margin-bottom:25px;
}

label{
display:block;
font-size:22px;
margin-bottom:10px;
}

input,
select,
textarea{
width:100%;
padding:18px;
border:none;
border-radius:18px;
background:#222;
color:white;
font-size:20px;
}

textarea{
height:150px;
resize:none;
}

button{
width:100%;
margin-top:25px;
background:#d4af37;
color:#111;
padding:20px;
border:none;
border-radius:40px;
font-size:24px;
font-weight:bold;
cursor:pointer;
}

.note{
margin-top:35px;
font-size:20px;
color:#aaa;
line-height:1.8;
text-align:center;
}
</style>
</head>

<body>

<section class="page">

<div class="box">

<h1>تواصل معنا</h1>

<p class="subtitle">
للاستفسارات، ملاحظات المستخدمين، أو طلبات المعارض، يمكنك مراسلتنا من هنا.
</p>

<div class="field">
<label>الاسم</label>
<input placeholder="اكتب اسمك">
</div>

<div class="field">
<label>رقم الهاتف</label>
<input placeholder="مثال: 07xxxxxxxxx">
</div>

<div class="field">
<label>نوع الرسالة</label>
<select>
<option>استفسار عام</option>
<option>مشكلة في إعلان</option>
<option>طلب معرض سيارات</option>
<option>اقتراح لتطوير المنصة</option>
</select>
</div>

<div class="field">
<label>الرسالة</label>
<textarea placeholder="اكتب رسالتك هنا"></textarea>
</div>

<button>
إرسال الرسالة
</button>

<p class="note">
هذه الصفحة مخصصة للتواصل الإداري فقط، ولا تعد سيارتي طرفًا في أي عملية بيع أو شراء بين المستخدمين.
</p>

</div>

</section>

</body>
</html>
