<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>المعارض المعتمدة</title>

<link rel="stylesheet" href="css/main.css">

<style>

.page{
padding:70px 8%;
background:#0c0c0c;
min-height:100vh;
}

.page h1{
text-align:center;
font-size:56px;
margin-bottom:60px;
}

.dealers{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
gap:35px;
}

.dealer{
background:#141414;
padding:35px;
border-radius:28px;
box-shadow:0 0 20px rgba(212,175,55,.12);
}

.dealer h2{
font-size:34px;
margin-bottom:20px;
}

.badge{
display:inline-block;
background:#d4af37;
color:#111;
padding:10px 20px;
border-radius:30px;
font-weight:bold;
margin-bottom:20px;
}

.info{
font-size:22px;
margin:15px 0;
}

.btn{
display:inline-block;
margin-top:30px;
background:#d4af37;
color:#111;
padding:15px 35px;
border-radius:35px;
text-decoration:none;
font-weight:bold;
}

</style>
</head>

<body>

<section class="page">

<h1>المعارض المعتمدة</h1>

<div class="dealers">


<div class="dealer">

<div class="badge">
بائع موثوق
</div>

<h2>
معرض الرافدين
</h2>

<div class="info">
120 سيارة معروضة
</div>

<div class="info">
بغداد
</div>

<a href="#" class="btn">
دخول المعرض
</a>

</div>



<div class="dealer">

<div class="badge">
بائع موثوق
</div>

<h2>
معرض النخبة
</h2>

<div class="info">
84 سيارة معروضة
</div>

<div class="info">
أربيل
</div>

<a href="#" class="btn">
دخول المعرض
</a>

</div>



<div class="dealer">

<div class="badge">
بائع موثوق
</div>

<h2>
معرض الملوك
</h2>

<div class="info">
62 سيارة معروضة
</div>

<div class="info">
بغداد
</div>

<a href="#" class="btn">
دخول المعرض
</a>

</div>


</div>

</section>

</body>
</html>
