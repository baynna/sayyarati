<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>تفاصيل السيارة</title>

<link rel="stylesheet" href="css/main.css">

<style>

.details{
padding:60px 8%;
background:#0c0c0c;
min-height:100vh;
}

.car-image{
width:100%;
max-width:900px;
display:block;
margin:auto;
border-radius:30px;
}

.info{
max-width:900px;
margin:40px auto;
background:#141414;
padding:40px;
border-radius:30px;
}

.info h1{
font-size:48px;
margin-bottom:30px;
}

.spec{
margin:18px 0;
font-size:26px;
}

.price{
color:#d4af37;
font-size:42px;
margin-top:25px;
}

.whatsapp{
display:inline-block;
margin-top:40px;
background:#d4af37;
color:#111;
padding:18px 40px;
border-radius:40px;
text-decoration:none;
font-weight:bold;
}

</style>
</head>

<body>

<section class="details">

<img
class="car-image"
src="https://images.unsplash.com/photo-1555215695-3004980ad54e"
>

<div class="info">

<h1>Porsche 911</h1>

<div class="spec">
السنة: 2022
</div>

<div class="spec">
الممشى: 24,000 كم
</div>

<div class="spec">
المدينة: بغداد
</div>

<div class="spec">
الحالة: ممتازة
</div>

<div class="price">
$88,000
</div>

<a
class="whatsapp"
href="#">
تواصل مع البائع
</a>

</div>

</section>

</body>
</html>
