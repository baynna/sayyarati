<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>تفاصيل السيارة</title>

<link rel="stylesheet" href="css/main.css">

<style>
.details{
padding:60px 8%;
background:#0c0c0c;
min-height:100vh;
}

.car-image{
width:100%;
max-width:900px;
display:block;
margin:auto;
border-radius:30px;
}

.info{
max-width:900px;
margin:40px auto;
background:#141414;
padding:45px;
border-radius:30px;
}

.info h1{
font-size:50px;
margin-bottom:30px;
}

.spec{
margin:18px 0;
font-size:25px;
}

.price{
color:#d4af37;
font-size:42px;
margin-top:30px;
}

.actions{
margin-top:45px;
}

.actions a{
display:inline-block;
margin:10px;
background:#d4af37;
color:#111;
padding:18px 35px;
border-radius:40px;
text-decoration:none;
font-weight:bold;
}

.loading{
text-align:center;
font-size:32px;
padding:100px;
}
</style>
</head>

<body>

<section class="details">

<div id="carDetails" class="loading">
جاري تحميل تفاصيل السيارة...
</div>

</section>

<script type="module" src="js/app.js"></script>

</body>
</html>
