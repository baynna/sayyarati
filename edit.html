<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>تعديل الإعلان</title>

<link rel="stylesheet" href="css/main.css">

<style>
.edit-page{
min-height:100vh;
background:#0c0c0c;
padding:70px 8%;
}

.form-box{
max-width:800px;
margin:auto;
background:#141414;
padding:50px;
border-radius:30px;
box-shadow:0 0 25px rgba(212,175,55,.12);
}

.form-box h1{
text-align:center;
margin-bottom:40px;
font-size:50px;
}

.field{
margin-bottom:25px;
}

.field label{
display:block;
margin-bottom:10px;
font-size:24px;
}

.field input,
.field textarea{
width:100%;
padding:18px;
border:none;
border-radius:18px;
font-size:20px;
background:#222;
color:white;
}

textarea{
height:140px;
resize:none;
}

.save-btn{
margin-top:35px;
width:100%;
background:#d4af37;
color:#111;
padding:20px;
border:none;
border-radius:40px;
font-size:24px;
font-weight:bold;
cursor:pointer;
}
</style>
</head>

<body>

<section class="edit-page">

<div class="form-box">

<h1>تعديل الإعلان</h1>

<form id="editForm">

<div class="field">
<label>اسم السيارة</label>
<input id="editName" type="text" required>
</div>

<div class="field">
<label>السنة</label>
<input id="editYear" type="text" required>
</div>

<div class="field">
<label>السعر</label>
<input id="editPrice" type="text" required>
</div>

<div class="field">
<label>المدينة</label>
<input id="editCity" type="text" required>
</div>

<div class="field">
<label>قراءة العداد</label>
<input id="editMileage" type="text" required>
</div>

<div class="field">
<label>رقم الهاتف</label>
<input id="editPhone" type="text" required>
</div>

<div class="field">
<label>وصف السيارة</label>
<textarea id="editDescription" required></textarea>
</div>

<button class="save-btn" type="submit">
حفظ التعديلات
</button>

</form>

</div>

</section>

<script type="module" src="js/editcar.js"></script>

</body>
</html>
