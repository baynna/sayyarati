<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>سيارتي</title>

<link rel="stylesheet" href="css/main.css">

<style>

.card a{
text-decoration:none;
color:white;
display:block;
}

.card{
transition:.3s;
cursor:pointer;
}

.card:hover{
transform:translateY(-8px);
}

.actions{
text-align:center;
margin-top:60px;
}

.actions a{
display:inline-block;
margin:12px;
background:#d4af37;
color:#111;
padding:18px 40px;
border-radius:40px;
text-decoration:none;
font-weight:bold;
}

.topbar{
position:fixed;
top:20px;
left:30px;
z-index:999;
}

.topbar a{
background:#d4af37;
color:#111;
padding:12px 30px;
border-radius:30px;
text-decoration:none;
font-weight:bold;
}

</style>

</head>
<body>

<div class="topbar">
<a href="account.html">
حسابي
</a>
</div>

<section class="hero">

<div class="hero-box">

<h1 class="logo">
<span>◉</span> سيارتي
</h1>

<p class="tag">
سوق سيارات فاخر للبيع والشراء بثقة
</p>

<div class="actions">

<a href="#cars">
تصفح السيارات
</a>

<a href="sell.html">
اعرض سيارتك للبيع
</a>

</div>

</div>

</section>


<section id="cars" class="section">

<h2>سيارات مميزة</h2>

<div class="cards">

<div class="card">
<a href="details.html">
<img src="https://images.unsplash.com/photo-1555215695-3004980ad54e">
<h3>Porsche 911</h3>
<p>2022 | بغداد | $88,000</p>
</a>
</div>

<div class="card">
<a href="details.html">
<img src="https://images.unsplash.com/photo-1494976388531-d1058494cdd8">
<h3>BMW X7</h3>
<p>2021 | أربيل | $57,000</p>
</a>
</div>

<div class="card">
<a href="details.html">
<img src="https://images.unsplash.com/photo-1503376780353-7e6692767b70">
<h3>Mercedes S-Class</h3>
<p>2023 | بغداد | $42,000</p>
</a>
</div>

</div>


<div class="actions">

<a href="#">
عرض المزيد
</a>

<a href="sell.html">
أضف إعلان سيارة
</a>

</div>

</section>

<script src="js/app.js"></script>

</body>
</html>
