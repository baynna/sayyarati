<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>سيارتي</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Tahoma,Arial;
background:#050505;
color:white;
}

.hero{
height:100vh;
background:
linear-gradient(rgba(0,0,0,.55),rgba(0,0,0,.7)),
url('https://images.unsplash.com/photo-1503376780353-7e6692767b70');
background-size:cover;
background-position:center;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
padding:30px;
}

.hero-box{
max-width:900px;
}

.logo{
font-size:90px;
font-weight:300;
letter-spacing:4px;
margin-bottom:20px;
}

.logo span{
color:#d4af37;
}

.tag{
font-size:30px;
margin-bottom:40px;
color:#ddd;
}

.btn{
display:inline-block;
background:#d4af37;
color:#111;
padding:18px 45px;
border-radius:40px;
text-decoration:none;
font-weight:bold;
font-size:20px;
}

.section{
padding:90px 8%;
background:#0c0c0c;
}

.section h2{
text-align:center;
font-size:50px;
margin-bottom:50px;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:35px;
}

.card{
background:#141414;
border-radius:24px;
overflow:hidden;
box-shadow:0 0 25px rgba(212,175,55,.15);
}

.card img{
width:100%;
height:240px;
object-fit:cover;
}

.card h3{
padding:20px;
font-size:28px;
}

.card p{
padding:0 20px 30px;
font-size:22px;
color:#d4af37;
}

</style>
</head>

<body>

<section class="hero">

<div class="hero-box">
<h1 class="logo">
<span>◉</span> سيارتي
</h1>

<p class="tag">
سوق سيارات فاخر للبيع والشراء بثقة
</p>

<a href="#cars" class="btn">
تصفح السيارات
</a>
</div>

</section>


<section id="cars" class="section">

<h2>سيارات مميزة</h2>

<div class="cards">

<div class="card">
<img src="https://images.unsplash.com/photo-1555215695-3004980ad54e">
<h3>Porsche 911</h3>
<p>$88,000</p>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1494976388531-d1058494cdd8">
<h3>BMW X7</h3>
<p>$57,000</p>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1503376780353-7e6692767b70">
<h3>Mercedes S-Class</h3>
<p>$42,000</p>
</div>

</div>

</section>

</body>
</html>
