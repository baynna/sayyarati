<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>تسجيل الدخول</title>

<link rel="stylesheet" href="css/main.css">

<style>

body{
margin:0;
font-family:Tahoma;
background:#0c0c0c;
color:white;
}

.login-page{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:40px;
}

.login-box{
width:100%;
max-width:500px;
background:#141414;
padding:50px;
border-radius:30px;
box-shadow:0 0 30px rgba(212,175,55,.12);
}

.login-box h1{
text-align:center;
margin-bottom:40px;
font-size:50px;
}

.field{
margin-bottom:25px;
}

.field label{
display:block;
margin-bottom:10px;
font-size:22px;
}

.field input{
width:100%;
padding:18px;
border:none;
border-radius:18px;
background:#222;
color:white;
font-size:20px;
}

.login-btn{
width:100%;
padding:20px;
border:none;
border-radius:40px;
background:#d4af37;
color:#111;
font-size:24px;
font-weight:bold;
cursor:pointer;
margin-top:20px;
}

.register-link{
text-align:center;
margin-top:25px;
}

.register-link a{
color:#d4af37;
text-decoration:none;
font-size:20px;
}

</style>

</head>

<body>

<section class="login-page">

<div class="login-box">

<h1>تسجيل الدخول</h1>

<form id="loginForm">

<div class="field">
<label>البريد الإلكتروني</label>
<input
type="email"
id="loginEmail"
required
>
</div>

<div class="field">
<label>كلمة المرور</label>
<input
type="password"
id="loginPassword"
required
>
</div>

<button class="login-btn">
دخول
</button>

</form>

<div class="register-link">
<a href="register.html">
ليس لديك حساب؟ إنشاء حساب
</a>
</div>

</div>

</section>

<script type="module" src="js/app.js"></script>

</body>
</html>
