<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>الرسائل</title>

<link rel="stylesheet" href="css/main.css">

<style>

.page{
min-height:100vh;
background:#0c0c0c;
padding:60px 8%;
}

.chat-box{
max-width:900px;
margin:auto;
background:#141414;
border-radius:30px;
overflow:hidden;
box-shadow:0 0 25px rgba(212,175,55,.12);
}

.header{
background:#d4af37;
color:#111;
padding:25px 35px;
font-size:30px;
font-weight:bold;
}

.messages{
padding:35px;
}

.msg{
margin-bottom:30px;
padding:20px 25px;
border-radius:22px;
max-width:75%;
font-size:22px;
line-height:1.7;
}

.buyer{
background:#222;
margin-right:auto;
}

.seller{
background:#1d1d1d;
margin-left:auto;
border:1px solid #333;
}

.compose{
padding:30px;
display:flex;
gap:15px;
background:#111;
}

.compose input{
flex:1;
padding:18px;
border:none;
border-radius:18px;
background:#222;
color:white;
font-size:20px;
}

.compose button{
background:#d4af37;
border:none;
padding:18px 35px;
border-radius:18px;
font-weight:bold;
font-size:20px;
}

.notice{
max-width:900px;
margin:30px auto;
font-size:18px;
color:#bbb;
text-align:center;
}

</style>

</head>
<body>

<section class="page">

<div class="chat-box">

<div class="header">
محادثة حول Porsche 911
</div>


<div class="messages">

<div class="msg buyer">
هل السيارة ما زالت متوفرة؟
</div>

<div class="msg seller">
نعم متوفرة، السيارة بحالة ممتازة.
</div>

<div class="msg buyer">
هل السعر قابل للتفاوض؟
</div>

<div class="msg seller">
بسيط جدًا بعد المعاينة.
</div>

</div>


<div class="compose">

<input placeholder="اكتب رسالتك">

<button>
إرسال
</button>

</div>

</div>


<div class="notice">
سيارتي توفر وسيلة تواصل فقط وليست طرفًا في أي اتفاق بين المستخدمين.
</div>

</section>

</body>
</html>
