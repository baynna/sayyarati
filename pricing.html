<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>سعر السوق العادل</title>

<link rel="stylesheet" href="css/main.css">

<style>

.page{
padding:70px 8%;
background:#0c0c0c;
min-height:100vh;
}

.box{
max-width:850px;
margin:auto;
background:#141414;
padding:50px;
border-radius:30px;
box-shadow:0 0 20px rgba(212,175,55,.12);
}

h1{
text-align:center;
font-size:56px;
margin-bottom:45px;
}

.field{
margin-bottom:25px;
}

input{
width:100%;
padding:18px;
border:none;
border-radius:18px;
background:#222;
color:white;
font-size:20px;
}

button{
width:100%;
padding:20px;
border:none;
border-radius:40px;
background:#d4af37;
font-size:24px;
font-weight:bold;
margin-top:20px;
}

.result{
margin-top:50px;
padding:35px;
background:#1d1d1d;
border-radius:25px;
}

.info{
font-size:24px;
margin:18px 0;
}

</style>
</head>

<body>

<section class="page">

<div class="box">

<h1>
سعر السوق العادل
</h1>

<div class="field">
<input placeholder="مثال: Toyota Land Cruiser 2021">
</div>

<div class="field">
<input placeholder="قراءة العداد">
</div>

<button>
تحليل السعر
</button>


<div class="result">

<div class="info">
السعر العادل:
48,000 - 52,000 دولار
</div>

<div class="info">
الإعلان الحالي:
ضمن النطاق الجيد
</div>

<div class="info">
التفاوض الممكن:
3%
</div>

</div>


</div>

</section>

</body>
</html>
