<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>إنشاء حساب</title>

<link rel="stylesheet" href="css/main.css">

<style>
.auth-page{
min-height:100vh;
background:#0c0c0c;
padding:70px 8%;
display:flex;
align-items:center;
justify-content:center;
}

.auth-box{
width:100%;
max-width:650px;
background:#141414;
padding:50px;
border-radius:30px;
box-shadow:0 0 25px rgba(212,175,55,.12);
}

.auth-box h1{
text-align:center;
font-size:48px;
margin-bottom:35px;
}

.field{
margin-bottom:24px;
}

.field label{
display:block;
font-size:22px;
margin-bottom:10px;
}

.field input{
width:100%;
padding:18px;
border:none;
border-radius:18px;
font-size:20px;
background:#222;
color:white;
}

.terms{
font-size:18px;
line-height:1.8;
color:#ddd;
margin:25px 0;
}

.terms input{
margin-left:8px;
}

.terms a{
color:#d4af37;
text-decoration:none;
}

.auth-btn{
width:100%;
background:#d4af37;
color:#111;
padding:20px;
border:none;
border-radius:40px;
font-size:24px;
font-weight:bold;
cursor:pointer;
}

.login-link{
text-align:center;
margin-top:25px;
font-size:19px;
}

.login-link a{
color:#d4af37;
text-decoration:none;
}
</style>
</head>

<body>

<section class="auth-page">

<div class="auth-box">

<h1>إنشاء حساب</h1>

<form id="registerForm">

<div class="field">
<label>البريد الإلكتروني</label>
<input id="registerEmail" type="email" required>
</div>

<div class="field">
<label>كلمة المرور</label>
<input id="registerPassword" type="password" required>
</div>

<div class="terms">
<label>
<input id="acceptTerms" type="checkbox" required>
أوافق على
<a href="terms.html" target="_blank">شروط الاستخدام وإخلاء المسؤولية</a>
وأقر بأن سيارتي منصة نشر وتسويق فقط وليست طرفًا في أي بيع أو شراء.
</label>
</div>

<button class="auth-btn" type="submit">
إنشاء الحساب
</button>

</form>

<div class="login-link">
لديك حساب؟ <a href="login.html">تسجيل الدخول</a>
</div>

</div>

</section>

<script type="module" src="js/app.js"></script>

</body>
</html>
