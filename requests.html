<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>اطلب سيارتك</title>

<link rel="stylesheet" href="css/main.css">

<style>
.page{
min-height:100vh;
background:#0c0c0c;
padding:70px 8%;
}

.box{
max-width:850px;
margin:auto;
background:#141414;
padding:50px;
border-radius:30px;
box-shadow:0 0 25px rgba(212,175,55,.12);
}

h1{
text-align:center;
font-size:52px;
margin-bottom:20px;
}

.subtitle{
text-align:center;
font-size:24px;
color:#ddd;
margin-bottom:45px;
}

.field{
margin-bottom:25px;
}

label{
display:block;
font-size:23px;
margin-bottom:10px;
}

input,
select,
textarea{
width:100%;
padding:18px;
border:none;
border-radius:18px;
background:#222;
color:white;
font-size:20px;
}

textarea{
height:130px;
resize:none;
}

.currency{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

.currency label{
background:#222;
padding:18px;
border-radius:18px;
font-size:20px;
cursor:pointer;
}

button{
width:100%;
margin-top:25px;
background:#d4af37;
color:#111;
padding:20px;
border:none;
border-radius:40px;
font-size:24px;
font-weight:bold;
cursor:pointer;
}

.recent{
max-width:850px;
margin:50px auto 0;
background:#141414;
padding:35px;
border-radius:30px;
}

.recent h2{
font-size:36px;
margin-bottom:25px;
}

.request{
border-top:1px solid #333;
padding:22px 0;
font-size:22px;
}

.request span{
color:#d4af37;
}
</style>
</head>

<body>

<section class="page">

<div class="box">

<h1>اطلب سيارتك</h1>

<p class="subtitle">
لم تجد السيارة المناسبة؟ اكتب طلبك ودع البائعين والمعارض يصلون إليك
</p>

<div class="field">
<label>نوع السيارة المطلوبة</label>
<input placeholder="مثال: Toyota Land Cruiser">
</div>

<div class="field">
<label>الموديل المطلوب</label>
<input placeholder="مثال: 2021">
</div>

<div class="field">
<label>المدينة</label>
<input placeholder="مثال: بغداد">
</div>

<div class="field">
<label>الميزانية</label>
<input placeholder="مثال: 45000 أو 58000000">
</div>

<div class="field">
<label>اختر العملة</label>

<div class="currency">
<label>
<input type="radio" name="currency" checked>
دولار
</label>

<label>
<input type="radio" name="currency">
دينار عراقي
</label>
</div>

</div>

<div class="field">
<label>ملاحظات إضافية</label>
<textarea placeholder="مثال: أفضل وارد خليجي، لون أسود، حالة نظيفة"></textarea>
</div>

<button>
نشر طلب شراء
</button>

</div>


<div class="recent">

<h2>طلبات حديثة</h2>

<div class="request">
مطلوب <span>Toyota Camry 2020</span> — بغداد — ميزانية 18,000 دولار
</div>

<div class="request">
مطلوب <span>SUV عائلية</span> — أربيل — ميزانية 32,000,000 دينار عراقي
</div>

<div class="request">
مطلوب <span>Land Cruiser 2021</span> — بغداد — ميزانية 58,000,000 دينار عراقي
</div>

</div>

</section>

</body>
</html>
