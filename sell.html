<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>أضف سيارتك للبيع</title>

<link rel="stylesheet" href="css/main.css">

<style>

.sell-page{
min-height:100vh;
background:#0c0c0c;
padding:70px 8%;
}

.form-box{
max-width:800px;
margin:auto;
background:#141414;
padding:50px;
border-radius:30px;
box-shadow:0 0 25px rgba(212,175,55,.12);
}

.form-box h1{
text-align:center;
margin-bottom:40px;
font-size:50px;
}

.field{
margin-bottom:25px;
}

.field label{
display:block;
margin-bottom:10px;
font-size:24px;
}

.field input,
.field textarea{
width:100%;
padding:18px;
border:none;
border-radius:18px;
font-size:20px;
background:#222;
color:white;
}

textarea{
height:140px;
resize:none;
}

.publish{
margin-top:35px;
width:100%;
background:#d4af37;
color:#111;
padding:20px;
border:none;
border-radius:40px;
font-size:24px;
font-weight:bold;
cursor:pointer;
}

</style>

</head>
<body>

<section class="sell-page">

<div class="form-box">

<h1>أضف سيارتك للبيع</h1>

<div class="field">
<label>اسم السيارة</label>
<input type="text">
</div>

<div class="field">
<label>السنة</label>
<input type="text">
</div>

<div class="field">
<label>السعر</label>
<input type="text">
</div>

<div class="field">
<label>المدينة</label>
<input type="text">
</div>

<div class="field">
<label>قراءة العداد</label>
<input type="text">
</div>

<div class="field">
<label>رقم الهاتف</label>
<input type="text">
</div>

<div class="field">
<label>وصف السيارة</label>
<textarea></textarea>
</div>

<button class="publish">
نشر الإعلان
</button>

</div>

</section>

</body>
</html>
